name: Accessibility (pa11y)

on:
  pull_request:

jobs:
  a11y:
    name: pa11y-ci (public pages)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
      AUTH_TRUST_HOST: 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - name: Start server
        run: npm run start &
      - name: Wait for server
        run: npx wait-on http://localhost:3000/login --timeout 60000
      - name: Run pa11y-ci
        run: npx pa11y-ci --config .pa11yci.json
