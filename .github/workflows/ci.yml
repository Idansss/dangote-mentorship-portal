name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    env:
      # Prisma needs a DATABASE_URL to load the schema; CI only generates the
      # client and runs pure unit tests, so no live database is required.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
