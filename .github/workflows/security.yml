name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fail only on prod-dependency high/critical advisories. Dev-only tooling
      # vulns (vitest/vite/etc.) don't ship and are tracked separately.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  snyk:
    name: Snyk (optional — runs when SNYK_TOKEN is set)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
