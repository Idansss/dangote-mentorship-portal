<script>
        // Micro-interaction for the password visibility toggle
        const toggleBtn = document.querySelector('button .material-symbols-outlined:contains("visibility")');
        const passwordInput = document.getElementById('password');

        if (passwordInput && toggleBtn) {
            let isVisible = false;
            toggleBtn.parentElement.addEventListener('click', () => {
                isVisible = !isVisible;
                passwordInput.type = isVisible ? 'text' : 'password';
                toggleBtn.textContent = isVisible ? 'visibility_off' : 'visibility';
            });
        }

        // Language toggle micro-interaction
        const langBtns = document.querySelectorAll('.bilingual-toggle button');
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Add a subtle parallax movement to the glow spots based on mouse position
        document.addEventListener('mousemove', (e) => {
            const glows = document.querySelectorAll('.ambient-glow');
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            
            glows.forEach((glow, index) => {
                const multiplier = index === 0 ? 1 : -1;
                glow.style.transform = `translate(${x * multiplier}px, ${y * multiplier}px)`;
            });
        });
    </script>
